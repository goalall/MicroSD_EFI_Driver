name: Build SD/MMC UEFI Drivers

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [X64]
        target: [RELEASE]

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. 设置 Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 3. 修复 apt 源并安装依赖（增强版）
      - name: Fix apt sources and install dependencies
        run: |
          # 确保 apt 源列表更新，并处理可能的锁定问题
          sudo rm -f /var/lib/apt/lists/lock
          sudo rm -f /var/cache/apt/archives/lock
          sudo rm -f /var/lib/dpkg/lock-frontend
          sudo dpkg --configure -a
          
          # 更新包列表（如果失败则重试）
          sudo apt-get update || (sleep 5 && sudo apt-get update)
          
          # 安装编译所需的所有包
          sudo apt-get install -y \
            build-essential \
            uuid-dev \
            iasl \
            git \
            nasm \
            python3 \
            python3-pip \
            python3-setuptools \
            acpica-tools \
            || (sleep 5 && sudo apt-get install -y -f)
          
          # 验证安装
          dpkg -l | grep -E "python3-setuptools|acpica-tools|nasm"

      # 4. 处理 Python 外部管理环境问题（针对 Ubuntu 24.04）
      - name: Fix Python external management
        run: |
          # 如果存在外部管理标记文件，备份并删除（允许使用 pip）
          if [ -f /usr/lib/python3.12/EXTERNALLY-MANAGED ]; then
            sudo mv /usr/lib/python3.12/EXTERNALLY-MANAGED /usr/lib/python3.12/EXTERNALLY-MANAGED.bak
            echo "Removed EXTERNALLY-MANAGED to allow pip installs"
          fi
          
          # 升级 pip 和 setuptools
          python3 -m pip install --upgrade pip setuptools wheel

      # 5. 验证版本
      - name: Check versions
        run: |
          python3 --version
          node --version
          gcc --version
          nasm --version
          pip3 list | grep setuptools

      # 6. 克隆 EDK2 并更新子模块
      - name: Clone EDK2 with submodules
        run: |
          git clone https://github.com/tianocore/edk2.git
          cd edk2
          git submodule update --init --recursive --depth=1

      # 7. 编译 BaseTools
      - name: Build BaseTools
        run: |
          cd edk2
          make -C BaseTools -j$(nproc)

      # 8. 设置 EDK2 编译环境并编译驱动
      - name: Compile SD/MMC drivers
        run: |
          cd edk2
          export EDK_TOOLS_PATH=$PWD/BaseTools
          . edksetup.sh BaseTools
          
          # 编译 SdMmcPciHcDxe
          echo "=== Building SdMmcPciHcDxe ==="
          build -a ${{ matrix.arch }} \
                -t GCC5 \
                -b ${{ matrix.target }} \
                -p MdeModulePkg/MdeModulePkg.dsc \
                -m MdeModulePkg/Bus/Pci/SdMmcPciHcDxe/SdMmcPciHcDxe.inf
          
          # 编译 SdDxe
          echo "=== Building SdDxe ==="
          build -a ${{ matrix.arch }} \
                -t GCC5 \
                -b ${{ matrix.target }} \
                -p MdeModulePkg/MdeModulePkg.dsc \
                -m MdeModulePkg/Bus/Sd/SdDxe/SdDxe.inf

      # 9. 查找并整理编译产物
      - name: Find and prepare artifacts
        run: |
          mkdir -p output
          find edk2/Build -name "*.efi" -type f | while read file; do
            if [[ "$file" == *"SdMmcPciHcDxe"* ]] || [[ "$file" == *"SdDxe"* ]]; then
              cp "$file" output/
              echo "Copied: $file"
            fi
          done
          ls -la output/

      # 10. 上传编译产物
      - name: Upload EFI drivers
        uses: actions/upload-artifact@v4
        with:
          name: sd-mmc-drivers-${{ matrix.arch }}-${{ matrix.target }}
          path: output/
          if-no-files-found: error
          retention-days: 30
