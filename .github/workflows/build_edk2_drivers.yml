name: Build SD/MMC UEFI Drivers

on:
  workflow_dispatch:  # 允许手动触发
  # push:
  #   branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [X64]
        target: [RELEASE]

    steps:
      # 1. 检出代码 - 使用支持 Node.js 24 的 v5 版本
      - name: Checkout repository
        uses: actions/checkout@v5  # 从 v4 升级到 v5

      # 2. 设置 Node.js 24 - 使用支持 Node.js 24 的 v5 版本
      - name: Setup Node.js
        uses: actions/setup-node@v5  # 从 v4 升级到 v5
        with:
          node-version: '24'

      # 3. 安装编译依赖
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            uuid-dev \
            iasl \
            git \
            nasm \
            python3 \
            python3-distutils \
            python3-pip \
            acpica-tools

      # 4. 验证 Python 和 Node 版本
      - name: Check versions
        run: |
          python3 --version
          node --version
          gcc --version
          nasm --version

      # 5. 克隆 EDK2 并更新子模块
      - name: Clone EDK2 with submodules
        run: |
          git clone https://github.com/tianocore/edk2.git
          cd edk2
          git submodule update --init --recursive --depth=1

      # 6. 编译 BaseTools
      - name: Build BaseTools
        run: |
          cd edk2
          make -C BaseTools -j$(nproc)

      # 7. 设置 EDK2 编译环境并编译驱动
      - name: Compile SD/MMC drivers
        run: |
          cd edk2
          export EDK_TOOLS_PATH=$PWD/BaseTools
          . edksetup.sh BaseTools
          
          # 编译 SdMmcPciHcDxe
          echo "=== Building SdMmcPciHcDxe ==="
          build -a ${{ matrix.arch }} \
                -t GCC5 \
                -b ${{ matrix.target }} \
                -p MdeModulePkg/MdeModulePkg.dsc \
                -m MdeModulePkg/Bus/Pci/SdMmcPciHcDxe/SdMmcPciHcDxe.inf
          
          # 编译 SdDxe
          echo "=== Building SdDxe ==="
          build -a ${{ matrix.arch }} \
                -t GCC5 \
                -b ${{ matrix.target }} \
                -p MdeModulePkg/MdeModulePkg.dsc \
                -m MdeModulePkg/Bus/Sd/SdDxe/SdDxe.inf

      # 8. 查找并整理编译产物
      - name: Find and prepare artifacts
        run: |
          mkdir -p output
          # 查找所有 .efi 文件，并复制匹配的驱动
          find edk2/Build -name "*.efi" -type f | while read file; do
            if [[ "$file" == *"SdMmcPciHcDxe"* ]] || [[ "$file" == *"SdDxe"* ]]; then
              cp "$file" output/
              echo "Copied: $file"
            fi
          done
          ls -la output/

      # 9. 上传编译产物 - upload-artifact v4 已经支持 Node.js 24
      - name: Upload EFI drivers
        uses: actions/upload-artifact@v4
        with:
          name: sd-mmc-drivers-${{ matrix.arch }}-${{ matrix.target }}
          path: output/
          if-no-files-found: error
          retention-days: 30
