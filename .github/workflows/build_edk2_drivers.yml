name: Build SD/MMC UEFI Drivers

on:
  workflow_dispatch:  # 允许手动触发
  # push:
  #   branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [X64]
        target: [RELEASE]

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 24（即使 EDK2 不依赖 Node，但为了满足环境要求）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. 安装编译依赖
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            uuid-dev \
            iasl \
            git \
            nasm \
            python3 \
            python3-distutils \
            python3-pip

      # 4. 验证 Python 和 Node 版本（仅用于确认环境）
      - name: Check versions
        run: |
          python3 --version
          node --version
          gcc --version

      # 5. 克隆 EDK2 并更新子模块
      - name: Clone EDK2 with submodules
        run: |
          git clone https://github.com/tianocore/edk2.git
          cd edk2
          git submodule update --init --recursive --depth=1

      # 6. 编译 BaseTools（EDK2 的基础工具）
      - name: Build BaseTools
        run: |
          cd edk2
          make -C BaseTools -j$(nproc)

      # 7. 设置 EDK2 编译环境并编译驱动
      - name: Compile SD/MMC drivers
        run: |
          cd edk2
          export EDK_TOOLS_PATH=$PWD/BaseTools
          . edksetup.sh BaseTools
          
          # 可选：修改 target.txt 使用 GCC5 工具链
          sed -i 's/^ACTIVE_PLATFORM.*/ACTIVE_PLATFORM = MdeModulePkg\/MdeModulePkg.dsc/' Conf/target.txt
          sed -i 's/^TARGET.*/TARGET = ${{ matrix.target }}/' Conf/target.txt
          sed -i 's/^TARGET_ARCH.*/TARGET_ARCH = ${{ matrix.arch }}/' Conf/target.txt
          sed -i 's/^TOOL_CHAIN_TAG.*/TOOL_CHAIN_TAG = GCC5/' Conf/target.txt
          
          echo "=== Building SdMmcPciHcDxe ==="
          build -m MdeModulePkg/Bus/Pci/SdMmcPciHcDxe/SdMmcPciHcDxe.inf
          
          echo "=== Building SdDxe ==="
          build -m MdeModulePkg/Bus/Sd/SdDxe/SdDxe.inf

      # 8. 查找并整理编译产物
      - name: Find and prepare artifacts
        run: |
          mkdir -p output
          find edk2/Build -name "*.efi" -type f | while read file; do
            if [[ "$file" == *"SdMmcPciHcDxe"* ]] || [[ "$file" == *"SdDxe"* ]]; then
              cp "$file" output/
              echo "Copied: $file"
            fi
          done
          ls -la output/

      # 9. 上传编译产物
      - name: Upload EFI drivers
        uses: actions/upload-artifact@v4
        with:
          name: sd-mmc-drivers-${{ matrix.arch }}-${{ matrix.target }}
          path: output/
          if-no-files-found: error
          retention-days: 30
